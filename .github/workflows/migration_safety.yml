name: Migration Safety

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'feature/**'
  pull_request:

jobs:
  migration-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            src/allten/runtime/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install All Ten dependencies
        run: npm ci --prefix src/allten/runtime --ignore-scripts

      - name: Run migration safety gate
        run: npm run check:migration
