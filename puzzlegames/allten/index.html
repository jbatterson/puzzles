<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>All Ten</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      /* TopBar + game: column flex so the game fills remaining viewport below the header */
      #container {
        height: var(--app-height, 100%);
        max-height: var(--app-height, 100%);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      ::-webkit-scrollbar {
        width: 0px;
        height: 0px;
      }
    </style>
  </head>
  <body>
    <div id="container"></div>
    <script type="module" src="/src/allten/main.jsx"></script>
  </body>
</html>
