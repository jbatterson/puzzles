<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>All Ten</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
      html, body { height: 100%; }
      body { margin: 0; padding: 0; }
      #container { height: 100%; }
      ::-webkit-scrollbar { width: 0px; height: 0px; }
    </style>
    <script src="./bundle_allten.js"></script>
    <script>
      function computePropsFromQueryString(qs) {
        const parsed = AllTenClient.parseQS(qs);
        const props = {rules: {}};

        const n = String(parsed.n || "");
        if (/^[0-9]{4}$/.test(n)) {
          props.start = n.split("").map((a) => parseInt(a));
        } else if (/^[0-9,]+$/.test(n)) {
          props.start = n.split(",").map(a => parseInt(a));
        } else if (n) {
          throw new Error("URL must include ?n=abcd, where abcd is 4 digits or a comma separated list of numbers.");
        }

        if (parsed.targets) {
          const targets = String(parsed.targets).split(",").map(a => parseInt(a));
          const allOk = targets.length > 0 && targets.length <= 10 && targets.every(t => Number.isFinite(t));
          if (allOk) {
            props.targets = targets;
          }
        }

        if (parsed.forbidOps) {
          const forbidOpsStr = String(parsed.forbidOps);
          props.rules.forbidOps = [
            forbidOpsStr.includes("a") ? "+" : null,
            forbidOpsStr.includes("s") ? "-" : null,
            forbidOpsStr.includes("m") ? "*" : null,
            forbidOpsStr.includes("d") ? "/" : null,
          ].filter(Boolean);
        }
        if (parsed.forbidParens) {
          props.rules.forbidParens = true;
        }
        if (parsed.forbidConcat) {
          props.rules.forbidConcat = true;
        } else if (props.start && props.start.some(n => n >= 10 || n < 0)) {
          props.rules.forbidConcat = true;
        }
        if (parsed.singleOps) {
          props.rules.singleOps = true;
        }
        if (parsed.opLimit) {
          const opLimit = parseInt(String(parsed.opLimit));
          if (Number.isFinite(opLimit) && opLimit > 0) {
            props.rules.opLimit = opLimit;
          }
        }
        if (parsed.impossible) {
          const impossible = parseInt(String(parsed.impossible));
          if (Number.isFinite(impossible) && impossible > 0) {
            props.rules.impossible = impossible;
          }
        }

        return props;
      }

      /* height recalculation (helps mobile browser chrome) */
      const recalculateHeight = () => {
        const doc = document.documentElement
        doc.style.setProperty('--app-height', `${window.innerHeight}px`)
      }
      window.addEventListener('resize', recalculateHeight)
      recalculateHeight()

      document.addEventListener("DOMContentLoaded", function() {
        const container = document.getElementById("container");
        if (!container) return;
        try {
          const props = computePropsFromQueryString(window.location.search);
          AllTenClient.render(container, props);
        } catch (ex) {
          console.log(ex);
          container.innerText = "Failed to initialize. " + String(ex);
        }
        recalculateHeight()
      });
    </script>
  </head>
  <body>
    <div id="container"></div>
  </body>
</html>
